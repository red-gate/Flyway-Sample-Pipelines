# =============================================================================
# Harness Open Source — Full Flyway Workflow Pipeline
# =============================================================================
# Equivalent of the GitLab schema-model-dynamic.gitlab-ci.yml.
#
# Complete workflow in a single pipeline:
#   1. Generate migration scripts from schema-model changes
#   2. Commit generated scripts back to the branch
#   3. Run flyway migrate against the target database
#
# This is designed for a single-database deployment. For multi-database
# registry-driven deployments, use flyway-registry-deploy.yaml instead.
#
# Environment variables (set in Harness repo/project secrets):
#   SOURCE_DATABASE_JDBC     — JDBC URL of the Dev database
#   SOURCE_DATABASE_USER     — Dev database username
#   SOURCE_DATABASE_PASSWORD — Dev database password (secret)
#   SHADOW_DATABASE_JDBC     — JDBC URL of a shadow/build database
#   TARGET_DATABASE_JDBC     — JDBC URL of the deployment target
#   TARGET_DATABASE_USER     — Target database username
#   TARGET_DATABASE_PASSWORD — Target database password (secret)
#   FLYWAY_EMAIL             — Flyway license email
#   FLYWAY_TOKEN             — Flyway license token (secret)
#   GIT_PUSH_USER            — Harness username for git push
#   GIT_PUSH_TOKEN           — Harness PAT with repo write access (secret)
#   HARNESS_URL              — Harness base URL (e.g. http://172.31.0.2:3000)
# =============================================================================

kind: pipeline
spec:
  stages:

  # -------------------------------------------------------------------
  # Stage 1: Generate migration scripts from schema-model
  # -------------------------------------------------------------------
  - type: ci
    name: generate-scripts
    spec:
      steps:
      - name: flyway_generate
        type: run
        spec:
          container: redgate/flyway:latest
          envs:
            SOURCE_DATABASE_JDBC: ${{ SOURCE_DATABASE_JDBC }}
            SOURCE_DATABASE_USER: ${{ SOURCE_DATABASE_USER }}
            SOURCE_DATABASE_PASSWORD: ${{ SOURCE_DATABASE_PASSWORD }}
            SHADOW_DATABASE_JDBC: ${{ SHADOW_DATABASE_JDBC }}
            SHADOW_DATABASE_USER: ${{ SOURCE_DATABASE_USER }}
            SHADOW_DATABASE_PASSWORD: ${{ SOURCE_DATABASE_PASSWORD }}
            FLYWAY_EMAIL: ${{ FLYWAY_EMAIL }}
            FLYWAY_TOKEN: ${{ FLYWAY_TOKEN }}
          script: |
            echo "=========================================="
            echo "Flyway -- Migration Script Generation"
            echo "=========================================="
            echo "Source Dev DB: ${SOURCE_DATABASE_JDBC}"
            echo "Shadow DB:    ${SHADOW_DATABASE_JDBC}"
            echo "=========================================="

            echo "--- Step 1: Sync SchemaModel with Dev database ---"
            flyway diff model \
              -diff.source=dev \
              -diff.target=schemaModel \
              -environments.dev.url="${SOURCE_DATABASE_JDBC}" \
              -environments.dev.user="${SOURCE_DATABASE_USER}" \
              -environments.dev.password="${SOURCE_DATABASE_PASSWORD}"

            echo "--- Step 2: Generate migration scripts ---"
            flyway diff generate \
              -diff.source=schemaModel \
              -diff.target=migrations \
              -generate.types=versioned,undo \
              -generate.description=AutoGenerated \
              -diff.buildEnvironment=shadow \
              -environments.shadow.url="${SHADOW_DATABASE_JDBC}" \
              -environments.shadow.user="${SHADOW_DATABASE_USER}" \
              -environments.shadow.password="${SHADOW_DATABASE_PASSWORD}" \
              -redgateCompare.sqlserver.options.behavior.addObjectExistenceChecks=true

            echo ""
            echo "========================================"
            echo "  Generated Migration Scripts"
            echo "========================================"
            ls -la migrations/ || echo "No migrations directory"
            echo "========================================"

      - name: commit_scripts
        type: run
        spec:
          container: alpine:latest
          envs:
            GIT_PUSH_USER: ${{ GIT_PUSH_USER }}
            GIT_PUSH_TOKEN: ${{ GIT_PUSH_TOKEN }}
            HARNESS_URL: ${{ HARNESS_URL }}
          script: |
            apk add --no-cache git >/dev/null 2>&1

            git config user.email "harness-ci@localhost"
            git config user.name "Harness CI"

            git add migrations/ schema-model/

            if git diff --cached --quiet; then
              echo "No new migration scripts -- nothing to commit."
              exit 0
            fi

            git diff --cached --stat
            git commit -m "chore: add auto-generated migration scripts"

            if [ -n "${GIT_PUSH_TOKEN}" ] && [ -n "${HARNESS_URL}" ]; then
              CURRENT_URL=$(git remote get-url origin)
              REPO_PATH=$(echo "${CURRENT_URL}" | sed 's|.*://[^/]*/||')
              AUTH_URL="${HARNESS_URL}/${REPO_PATH}"
              AUTH_URL=$(echo "${AUTH_URL}" | sed "s|://|://${GIT_PUSH_USER}:${GIT_PUSH_TOKEN}@|")
              git remote set-url origin "${AUTH_URL}"
            fi

            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git push origin "HEAD:${BRANCH}"

            echo "========================================"
            echo "Scripts committed to ${BRANCH}"
            echo "========================================"

  # -------------------------------------------------------------------
  # Stage 2: Check (drift + code analysis)
  # -------------------------------------------------------------------
  - type: ci
    name: check
    spec:
      steps:
      - name: flyway_check
        type: run
        spec:
          container: redgate/flyway:latest
          envs:
            FLYWAY_URL: ${{ TARGET_DATABASE_JDBC }}
            FLYWAY_USER: ${{ TARGET_DATABASE_USER }}
            FLYWAY_PASSWORD: ${{ TARGET_DATABASE_PASSWORD }}
            FLYWAY_EMAIL: ${{ FLYWAY_EMAIL }}
            FLYWAY_TOKEN: ${{ FLYWAY_TOKEN }}
            FLYWAY_BASELINE_ON_MIGRATE: "true"
          script: |
            echo "=========================================="
            echo "Flyway -- Drift + Code Analysis"
            echo "=========================================="
            flyway -v
            echo "Target: ${FLYWAY_URL}"
            echo "=========================================="

            mkdir -p reports

            flyway check -drift -code -dryrun \
              -check.deployedSnapshot=snapshothistory:current \
              -check.failOnDrift=false \
              -check.code.failOnError=false \
              -reportFilename="reports/check-report.html" \
              || true

            echo "--- Check complete ---"
        failure:
          type: ignore

  # -------------------------------------------------------------------
  # Stage 3: Migrate
  # -------------------------------------------------------------------
  - type: ci
    name: migrate
    spec:
      steps:
      - name: flyway_migrate
        type: run
        spec:
          container: redgate/flyway:latest
          envs:
            FLYWAY_URL: ${{ TARGET_DATABASE_JDBC }}
            FLYWAY_USER: ${{ TARGET_DATABASE_USER }}
            FLYWAY_PASSWORD: ${{ TARGET_DATABASE_PASSWORD }}
            FLYWAY_EMAIL: ${{ FLYWAY_EMAIL }}
            FLYWAY_TOKEN: ${{ FLYWAY_TOKEN }}
            FLYWAY_BASELINE_ON_MIGRATE: "true"
            FLYWAY_MIXED: "true"
            FLYWAY_OUT_OF_ORDER: "true"
          script: |
            echo "=========================================="
            echo "Flyway -- Migration"
            echo "=========================================="
            flyway -v
            echo "Target: ${FLYWAY_URL}"
            echo "=========================================="

            echo "--- Pre-Migration Info ---"
            flyway info

            echo "--- Migrate ---"
            flyway migrate

            echo "--- Post-Migration Snapshot ---"
            flyway snapshot -filename=snapshothistory:current

            echo "--- Post-Migration Info ---"
            flyway info

            echo "=========================================="
            echo "  Migration complete"
            echo "=========================================="
