# =============================================================================
# Harness Open Source — Flyway Migration Script Generation Pipeline
# =============================================================================
# Equivalent of the GitLab .flyway_generate_migrations template.
#
# This pipeline generates versioned migration SQL from schema-model changes:
#   1. flyway diff model    — sync SchemaModel with the Dev database
#   2. flyway diff generate — compare SchemaModel to Migrations, produce
#                             new V*__*.sql + U*__*.sql scripts
#   3. Git commit + push    — commit generated scripts back to the branch
#
# Environment variables (set in Harness repo/project secrets):
#   SOURCE_DATABASE_JDBC     — JDBC URL of the Dev database (diff source)
#   SOURCE_DATABASE_USER     — Dev database username
#   SOURCE_DATABASE_PASSWORD — Dev database password (secret)
#   SHADOW_DATABASE_JDBC     — JDBC URL of a shadow/build database
#   SHADOW_DATABASE_USER     — Shadow DB user (defaults to SOURCE_DATABASE_USER)
#   SHADOW_DATABASE_PASSWORD — Shadow DB password (defaults to SOURCE_DATABASE_PASSWORD)
#   FLYWAY_EMAIL             — Flyway license email
#   FLYWAY_TOKEN             — Flyway license token (secret)
#   GIT_PUSH_USER            — Harness username for git push
#   GIT_PUSH_TOKEN           — Harness PAT with repo write access (secret)
#   HARNESS_URL              — Harness base URL (e.g. http://172.31.0.2:3000)
# =============================================================================

kind: pipeline
spec:
  stages:

  # -------------------------------------------------------------------
  # Stage 1: Generate migration scripts from schema-model
  # -------------------------------------------------------------------
  - type: ci
    name: generate
    spec:
      steps:
      - name: flyway_diff_model
        type: run
        spec:
          container: redgate/flyway:latest
          envs:
            SOURCE_DATABASE_JDBC: ${{ SOURCE_DATABASE_JDBC }}
            SOURCE_DATABASE_USER: ${{ SOURCE_DATABASE_USER }}
            SOURCE_DATABASE_PASSWORD: ${{ SOURCE_DATABASE_PASSWORD }}
            SHADOW_DATABASE_JDBC: ${{ SHADOW_DATABASE_JDBC }}
            SHADOW_DATABASE_USER: ${{ SHADOW_DATABASE_USER }}
            SHADOW_DATABASE_PASSWORD: ${{ SHADOW_DATABASE_PASSWORD }}
            FLYWAY_EMAIL: ${{ FLYWAY_EMAIL }}
            FLYWAY_TOKEN: ${{ FLYWAY_TOKEN }}
            GENERATE_DESCRIPTION: "AutoGenerated"
            GENERATE_TYPES: "versioned,undo"
          script: |
            echo "=========================================="
            echo "Flyway — Migration Script Generation"
            echo "=========================================="
            echo "Source Dev DB: ${SOURCE_DATABASE_JDBC}"
            echo "Shadow DB:    ${SHADOW_DATABASE_JDBC}"
            echo "=========================================="

            # Use SOURCE_DATABASE_USER for shadow if not set
            SHADOW_USER="${SHADOW_DATABASE_USER:-${SOURCE_DATABASE_USER}}"
            SHADOW_PASS="${SHADOW_DATABASE_PASSWORD:-${SOURCE_DATABASE_PASSWORD}}"

            echo "--- Step 1: Sync SchemaModel with Dev database ---"
            flyway diff model \
              -diff.source=dev \
              -diff.target=schemaModel \
              -environments.dev.url="${SOURCE_DATABASE_JDBC}" \
              -environments.dev.user="${SOURCE_DATABASE_USER}" \
              -environments.dev.password="${SOURCE_DATABASE_PASSWORD}"

            echo "--- Step 2: Generate migration scripts ---"
            flyway diff generate \
              -diff.source=schemaModel \
              -diff.target=migrations \
              -generate.types="${GENERATE_TYPES}" \
              -generate.description="${GENERATE_DESCRIPTION}" \
              -diff.buildEnvironment=shadow \
              -environments.shadow.url="${SHADOW_DATABASE_JDBC}" \
              -environments.shadow.user="${SHADOW_USER}" \
              -environments.shadow.password="${SHADOW_PASS}" \
              -redgateCompare.sqlserver.options.behavior.addObjectExistenceChecks=true

            echo ""
            echo "========================================"
            echo "  Generated Migration Scripts"
            echo "========================================"
            ls -la migrations/
            echo "========================================"
            for f in migrations/V*.sql migrations/U*.sql; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                cat "$f"
                echo
              fi
            done
            echo "========================================"

      - name: commit_and_push
        type: run
        spec:
          container: alpine:latest
          envs:
            GIT_PUSH_USER: ${{ GIT_PUSH_USER }}
            GIT_PUSH_TOKEN: ${{ GIT_PUSH_TOKEN }}
            HARNESS_URL: ${{ HARNESS_URL }}
          script: |
            apk add --no-cache git >/dev/null 2>&1

            git config user.email "harness-ci@localhost"
            git config user.name "Harness CI"

            git add migrations/ schema-model/

            if git diff --cached --quiet; then
              echo "No new migration scripts -- nothing to commit."
              exit 0
            fi

            git diff --cached --stat
            git commit -m "chore: add auto-generated migration scripts"

            # Set up authenticated remote for push
            if [ -n "${GIT_PUSH_TOKEN}" ] && [ -n "${HARNESS_URL}" ]; then
              CURRENT_URL=$(git remote get-url origin)
              # Replace protocol://host with authenticated URL
              REPO_PATH=$(echo "${CURRENT_URL}" | sed 's|.*://[^/]*/||')
              PUSH_URL="${HARNESS_URL}/${REPO_PATH}"
              # Inject credentials
              AUTH_URL=$(echo "${PUSH_URL}" | sed "s|://|://${GIT_PUSH_USER}:${GIT_PUSH_TOKEN}@|")
              git remote set-url origin "${AUTH_URL}"
            fi

            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git push origin "HEAD:${BRANCH}"

            echo "========================================"
            echo "Migration scripts committed to ${BRANCH}"
            echo "========================================"
