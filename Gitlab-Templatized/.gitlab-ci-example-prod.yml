# Example Pipeline 2: Production Environment with Staging
# This pipeline deploys migrations to STAGING first, then PRODUCTION with approval gates
#
# SETUP REQUIRED:
# Configure these CI/CD variables in GitLab with Environment Scope:
#
# Staging scope (Environment Scope = "staging"):
#   - TARGET_DATABASE_JDBC = jdbc:postgresql://staging-db.example.com:5432/myapp
#   - TARGET_DATABASE_USER = flyway_user
#   - TARGET_DATABASE_PASSWORD = staging-password
#
# Production scope (Environment Scope = "production"):
#   - TARGET_DATABASE_JDBC = jdbc:postgresql://prod-db.example.com:5432/myapp
#   - TARGET_DATABASE_USER = flyway_user
#   - TARGET_DATABASE_PASSWORD = prod-password (mark as Protected and Masked)

include:
  - local: '.gitlab/ci/flyway.yml'

stages:
  - validate
  - staging
  - production

# Variables are scoped by environment in GitLab CI/CD settings
# No need to define them here - they're automatically loaded based on environment

# Validate on main branch
validate:prod:
  extends: .flyway_validate
  stage: validate
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Deploy to STAGING first
migrate:staging:
  extends: .flyway_migrate
  stage: staging
  environment:
    name: staging
    url: https://staging.myapp.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Show production info before migration
info:production:
  extends: .flyway_info
  stage: production
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG

# Deploy to PRODUCTION (manual approval required)
migrate:production:
  extends: .flyway_migrate
  stage: production
  environment:
    name: production
    url: https://myapp.com
  before_script:
    - echo "⚠️  ⚠️  ⚠️  PRODUCTION DEPLOYMENT ⚠️  ⚠️  ⚠️"
    - echo "Flyway version:"
    - flyway -v
    - echo "Database URL: ${FLYWAY_URL}"
    - echo "This requires manual approval. Click 'Play' button to proceed."
    - echo "==========================================="
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

# Manual repair for production (use with caution)
repair:production:
  extends: .flyway_repair
  stage: production
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual
