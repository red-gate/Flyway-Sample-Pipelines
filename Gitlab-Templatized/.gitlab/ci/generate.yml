# =============================================================================
# Template for dynamic pipeline generation from the jdbc_table_store registry.
#
# One job template that does everything:
#   .generate_pipeline  -- calls the sproc, builds JDBC URLs, writes dynamic-pipeline.yml
#
# The stored procedure returns raw rows from jdbc_table_store. The Python
# script filters by location/availability, constructs JDBC URLs, and
# generates a child pipeline with one .flyway_migrate job per target DB.
#
# =============================================================================
# DEPLOY ALL REGIONS  (omit FILTER_LOCATION or set it to "all")
# =============================================================================
#
#   include:
#     - local: ".gitlab/ci/flyway.yml"
#     - local: ".gitlab/ci/generate.yml"
#
#   stages: [generate, deploy]
#
#   generate:all:
#     extends: .generate_pipeline
#     # No FILTER_LOCATION — deploys to all regions
#
#   deploy:all:
#     stage: deploy
#     trigger:
#       include:
#         - artifact: dynamic-pipeline.yml
#           job: generate:all
#       strategy: depend
#
# =============================================================================
# DEPLOY ONE REGION  (set FILTER_LOCATION to the exact region name)
# =============================================================================
#
#   generate:london:
#     extends: .generate_pipeline
#     variables:
#       FILTER_LOCATION: "London"   # exact value from the location column
#                                   # e.g. "New York", "Tokyo", "London"
#
#   deploy:london:
#     stage: deploy
#     trigger:
#       include:
#         - artifact: dynamic-pipeline.yml
#           job: generate:london
#       strategy: depend
#
# =============================================================================

# ---------------------------------------------------------------------------
# Single job: query registry → filter → build JDBCs → write child pipeline
# ---------------------------------------------------------------------------
.generate_pipeline:
  stage: generate
  image: python:3.11-slim
  before_script:
    - pip install --quiet -r scripts/requirements.txt
  script:
    - echo "Generating pipeline for location=${FILTER_LOCATION:-all}"
    - python scripts/generate_pipeline.py
    - echo "--- dynamic-pipeline.yml ---"
    - cat dynamic-pipeline.yml
  variables:
    # -------------------------------------------------------------------------
    # Registry database connection
    # Set REGISTRY_SERVER, REGISTRY_USER, REGISTRY_PASSWORD in
    # GitLab Settings → CI/CD → Variables (password: Protected + Masked)
    # -------------------------------------------------------------------------
    REGISTRY_DATABASE: "flyway_registry"
    REGISTRY_PORT:     "1433"
    JDBC_PORT:         "1433"
    OUTPUT_FILE:       "dynamic-pipeline.yml"

    # -------------------------------------------------------------------------
    # Filtering
    # Set FILTER_LOCATION in the calling job to limit to one region.
    # Omit or set to "all" to deploy to every region.
    # -------------------------------------------------------------------------
    # FILTER_LOCATION: "all"
    INCLUDE_REPLICAS:  "false"

    # -------------------------------------------------------------------------
    # Flyway migration path (passed through to child pipeline)
    # -------------------------------------------------------------------------
    FLYWAY_LOCATIONS: "filesystem:./migrations"

    # -------------------------------------------------------------------------
    # Cross-project include for child pipeline
    # Set TEMPLATE_PROJECT to your templates repo path so the generated child
    # pipeline can find flyway.yml. Leave empty if templates are in the same repo.
    # -------------------------------------------------------------------------
    # TEMPLATE_PROJECT: "root/templatized-with-parser"
    # TEMPLATE_REF:     "v1.0.0"

    # -------------------------------------------------------------------------
    # Regional runner tags
    # Override to match the tag names on your actual GitLab runners.
    # -------------------------------------------------------------------------
    RUNNER_TAG_LONDON:   "runner-london"
    RUNNER_TAG_NEW_YORK: "runner-new-york"
    RUNNER_TAG_TOKYO:    "runner-tokyo"
  artifacts:
    paths:
      - dynamic-pipeline.yml
    reports:
      dotenv: generate.env
    expire_in: 2 hours
  cache:
    key: "${CI_JOB_NAME}-targets"
    paths:
      - .targets_hash
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Trigger template: only run the child pipeline if targets changed.
# Use alongside .generate_pipeline:
#
#   generate:all:
#     extends: .generate_pipeline
#
#   deploy:all:
#     extends: .deploy_if_changed
#     needs: [generate:all]
#     trigger:
#       include:
#         - artifact: dynamic-pipeline.yml
#           job: generate:all
#       strategy: depend
#
# To always deploy regardless, use the trigger job without this template.
# ---------------------------------------------------------------------------
.deploy_if_changed:
  stage: deploy
  rules:
    - if: $TARGETS_CHANGED == "true"
    - if: $FORCE_DEPLOY == "true"


# ---------------------------------------------------------------------------
# Cross-project pipeline generator
# ---------------------------------------------------------------------------
# Use this when the generate_pipeline.py script lives in a separate template
# repo (the common case for consumer projects).  It clones the template repo
# at TEMPLATE_PROJECT/TEMPLATE_REF, installs dependencies, and runs the
# generator.
#
# Consumer projects override OVERRIDE_REGISTRY_* to point at the right
# registry per environment, avoiding GitLab variable-precedence issues.
#
# Usage:
#   .my_generate:
#     extends: .generate_pipeline_remote
#     variables:
#       OVERRIDE_REGISTRY_SERVER:   "$QA_REGISTRY_SERVER"
#       OVERRIDE_REGISTRY_USER:     "$QA_REGISTRY_USER"
#       OVERRIDE_REGISTRY_PASSWORD: "$QA_REGISTRY_PASSWORD"
#       TARGET_USER_VAR:     "QA_TARGET_DATABASE_USER"
#       TARGET_PASSWORD_VAR: "QA_TARGET_DATABASE_PASSWORD"
#       FILTER_LOCATION:     "London"
#       OUTPUT_FILE:         "dynamic-pipeline-qa-london.yml"
#     artifacts:
#       paths: ["dynamic-pipeline-qa-london.yml"]
#     rules:
#       - if: $CI_COMMIT_BRANCH == "qa"
# ---------------------------------------------------------------------------
.generate_pipeline_remote:
  stage: pipeline
  image: python:3.12-slim
  variables:
    TEMPLATE_PROJECT: "root/templatized-with-parser"
    TEMPLATE_REF: "main"
    REGISTRY_DATABASE: "flyway_registry"
    REGISTRY_PORT: "1433"
    JDBC_PORT: "1433"
    OUTPUT_FILE: "dynamic-pipeline.yml"
    INCLUDE_REPLICAS: "false"
    FLYWAY_LOCATIONS: "filesystem:./migrations"
  script:
    - apt-get update -qq && apt-get install -y -qq git > /dev/null
    - git clone --depth 1 --branch "$TEMPLATE_REF"
        "http://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}:${CI_SERVER_PORT}/${TEMPLATE_PROJECT}.git"
        /tmp/templates
    - pip install --quiet -r /tmp/templates/scripts/requirements.txt
    - export REGISTRY_SERVER="${OVERRIDE_REGISTRY_SERVER}"
    - export REGISTRY_USER="${OVERRIDE_REGISTRY_USER}"
    - export REGISTRY_PASSWORD="${OVERRIDE_REGISTRY_PASSWORD}"
    - echo "Registry server=${REGISTRY_SERVER}"
    - echo "Generating pipeline for ${FILTER_LOCATION:-all} → ${OUTPUT_FILE}"
    - python /tmp/templates/scripts/generate_pipeline.py
    - cat "${OUTPUT_FILE}"
  artifacts:
    paths:
      - "${OUTPUT_FILE}"
    expire_in: 2 hours
