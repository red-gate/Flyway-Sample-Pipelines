# =============================================================================
# Shared Flyway Template (DRY - Don't Repeat Yourself)
# =============================================================================
# Single source of truth for ALL Flyway job definitions.
#
# Include in any pipeline:
#   include:
#     - local: '.gitlab/ci/flyway.yml'
#
# For schema-model → migration-script generation, also include:
#   include:
#     - local: '.gitlab/ci/generate-deployment-scripts.yml'
#
# For dynamic multi-database deployments driven by the jdbc_table_store
# registry, also include:
#   include:
#     - local: '.gitlab/ci/generate.yml'
#
# A single Python script (scripts/generate_pipeline.py) calls the sproc,
# builds JDBC URLs from the dbserver/db columns, and produces a child
# pipeline whose jobs all extend .flyway_migrate below.
# Credentials are NEVER embedded in generated YAML – they come from GitLab
# CI/CD variables TARGET_DATABASE_USER and TARGET_DATABASE_PASSWORD.
# =============================================================================

.flyway_base:
  image:
    name: redgate/flyway:latest
    entrypoint: [""]
    pull_policy: if-not-present
  variables:
    # Map GitLab CI/CD variables to Flyway environment variables
    # These can be overridden in specific jobs as needed
    FLYWAY_URL: "${TARGET_DATABASE_JDBC}"
    FLYWAY_USER: "${TARGET_DATABASE_USER}"
    FLYWAY_PASSWORD: "${TARGET_DATABASE_PASSWORD}"
    FLYWAY_EMAIL: "${FLYWAY_EMAIL}"
    FLYWAY_TOKEN: "${FLYWAY_TOKEN}"
    # Override in your pipeline if your migrations live elsewhere.
    # e.g. filesystem:./migrations  (Flyway Enterprise default)
    #      filesystem:./db/migrations
    FLYWAY_LOCATIONS: "filesystem:./migrations"
    FLYWAY_BASELINE_ON_MIGRATE: "true"
    FLYWAY_MIXED: "false"
    FLYWAY_OUT_OF_ORDER: "false"
    FLYWAY_CLEAN_DISABLED: "false"
    FLYWAY_ENV_NATIVE_SQLFLUFF: "true"
    # Templates repo — used to fetch rules for code analysis
    TEMPLATE_PROJECT: "root/templatized-with-parser"
    TEMPLATE_REF: "main"
    CHECK_RULES_LOCATION: "/tmp/templates/rules"
    REPORT_DIR: "reports"
  before_script:
    - "echo =========================================="
    - "echo Flyway Database Migration"
    - "echo =========================================="
    - "flyway -v"
    - "echo Target database: ${FLYWAY_URL}"
    - "echo Target user: ${FLYWAY_USER}"
    - "echo SQL locations: ${FLYWAY_LOCATIONS}"
    - "echo =========================================="
    - "apk add --no-cache git >/dev/null 2>&1 || apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1 || true"
    - "git clone --depth 1 --branch ${TEMPLATE_REF} http://gitlab-ci-token:${CI_JOB_TOKEN}@172.30.0.2/${TEMPLATE_PROJECT}.git /tmp/templates 2>/dev/null || true"
    - "mkdir -p ${REPORT_DIR}"

# Job template: Validate SQL migrations
.flyway_validate:
  extends: .flyway_base
  script:
    - flyway -ignoreMigrationPatterns="*:pending" validate
  allow_failure: false

# Job template: Get migration info
.flyway_info:
  extends: .flyway_base
  script:
    - flyway info

# Job template: Run migrations (with post-migrate snapshot)
.flyway_migrate:
  extends: .flyway_base
  script:
    - flyway info
    - flyway migrate
    - flyway snapshot -filename=snapshothistory:current
    - flyway info
  artifacts:
    expose_as: "Flyway Reports"
    paths:
      - reports/
    when: always
    expire_in: 30 days

# Job template: Drift + code analysis (combined report)
.flyway_check:
  extends: .flyway_base
  script:
    - "echo '--- Drift + Code Analysis Report ---'"
    - >
      flyway check -drift -code -dryrun
      -check.deployedSnapshot=snapshothistory:current
      -check.failOnDrift=false
      -check.code.failOnError=false
      -check.rulesLocation="${CHECK_RULES_LOCATION}"
      -reportFilename="${REPORT_DIR}/${CI_JOB_NAME}-${CI_PIPELINE_ID}-report.html"
  artifacts:
    expose_as: "Flyway Reports"
    paths:
      - reports/
    when: always
    expire_in: 30 days
  allow_failure: true

# Job template: Migrate + drift + code analysis (all-in-one)
.flyway_migrate_full:
  extends: .flyway_base
  script:
    - "echo '--- Drift + Code Analysis Report ---'"
    - >
      flyway check -drift -code -dryrun
      -check.deployedSnapshot=snapshothistory:current
      -check.failOnDrift=false
      -check.code.failOnError=false
      -check.rulesLocation="${CHECK_RULES_LOCATION}"
      -reportFilename="${REPORT_DIR}/${CI_JOB_NAME}-${CI_PIPELINE_ID}-report.html"
    - "echo '--- Pre-Migration Info ---'"
    - flyway info
    - "echo '--- Migrate ---'"
    - flyway migrate
    - "echo '--- Post-Migration Snapshot ---'"
    - flyway snapshot -filename=snapshothistory:current
    - "echo '--- Post-Migration Info ---'"
    - flyway info
  artifacts:
    expose_as: "Flyway Reports"
    paths:
      - reports/
    when: always
    expire_in: 30 days

# Job template: Repair migration history
.flyway_repair:
  extends: .flyway_base
  script:
    - flyway repair
  when: manual

# Job template: Clean database (DANGEROUS - use with caution)
.flyway_clean:
  extends: .flyway_base
  script:
    - flyway clean
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^dev(elopment)?$/

# Job template: Baseline existing database
.flyway_baseline:
  extends: .flyway_base
  script:
    - flyway baseline
  when: manual
