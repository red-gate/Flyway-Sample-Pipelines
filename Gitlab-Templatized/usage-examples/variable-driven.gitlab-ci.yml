# =============================================================================
# Variable-Driven Deployment (No Registry / No Sproc)
# =============================================================================
# Deploy to one or more databases defined entirely via GitLab CI/CD variables.
# No stored procedure, no Python script — just variables and templates.
#
# ─────────────────────────────────────────────────────────────────────────────
# SINGLE DATABASE
# ─────────────────────────────────────────────────────────────────────────────
# GitLab Settings → CI/CD → Variables:
#   TARGET_DATABASE_JDBC     = jdbc:sqlserver://myserver:1433;databaseName=mydb;encrypt=true
#   TARGET_DATABASE_USER     = flyway_user
#   TARGET_DATABASE_PASSWORD = *** (Protected + Masked)
#   FLYWAY_EMAIL             = you@company.com
#   FLYWAY_TOKEN             = *** (Protected + Masked)
#
# ─────────────────────────────────────────────────────────────────────────────
# MULTIPLE DATABASES (numbered suffix pattern)
# ─────────────────────────────────────────────────────────────────────────────
# GitLab Settings → CI/CD → Variables:
#   TARGET_DATABASE_JDBC_1     = jdbc:sqlserver://server1:1433;databaseName=db1;encrypt=true
#   TARGET_DATABASE_USER_1     = flyway_user
#   TARGET_DATABASE_PASSWORD_1 = ***
#
#   TARGET_DATABASE_JDBC_2     = jdbc:sqlserver://server2:1433;databaseName=db2;encrypt=true
#   TARGET_DATABASE_USER_2     = flyway_user
#   TARGET_DATABASE_PASSWORD_2 = ***
#
#   TARGET_DATABASE_JDBC_3     = jdbc:sqlserver://server3:1433;databaseName=db3;encrypt=true
#   TARGET_DATABASE_USER_3     = flyway_user
#   TARGET_DATABASE_PASSWORD_3 = ***
#
#   FLYWAY_EMAIL               = you@company.com
#   FLYWAY_TOKEN               = ***
#
# Consumer repo structure:
#   my-flyway-project/
#   ├── migrations/
#   │   ├── V1__create_schema.sql
#   │   └── V2__add_users_table.sql
#   └── .gitlab-ci.yml          ← this file
# =============================================================================

include:
  - project: 'root/templatized-with-parser'       # ← path to the templates repo
    ref: 'v1.0.0'                                 # ← pin to a release tag
    file: '/.gitlab/ci/flyway.yml'

stages:
  - validate
  - deploy

# =============================================================================
# OPTION 1: Single database (uses default TARGET_DATABASE_* variables)
# =============================================================================

validate:
  extends: .flyway_validate
  stage: validate
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

migrate:
  extends: .flyway_migrate
  stage: deploy
  environment: { name: production }
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

