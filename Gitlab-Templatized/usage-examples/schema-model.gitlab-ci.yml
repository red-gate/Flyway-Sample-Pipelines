# =============================================================================
# Schema Model → Auto-Generated Migrations with Approval Gate
# =============================================================================
# Devs edit files in schema-model/.  The pipeline uses flyway-dev to generate
# versioned migration SQL, lets a reviewer approve, commits the scripts to the
# branch, and then deploys on a second manual click.
#
# Pipeline flow:
#   ┌──────────┐     ┌───────────────┐     ┌───────────┐
#   │ generate │ ──▶ │ review/commit │ ──▶ │  deploy   │
#   │  (auto)  │     │   (manual)    │     │  (manual) │
#   └──────────┘     └───────────────┘     └───────────┘
#
# CI/CD Variables required (Settings → CI/CD → Variables):
#   TARGET_DATABASE_JDBC     = JDBC URL of the Dev database (diff source)
#   TARGET_DATABASE_USER     = flyway_user
#   TARGET_DATABASE_PASSWORD = *** (Protected + Masked)
#   SHADOW_DATABASE_JDBC     = JDBC URL of a shadow/build database (empty DB
#                               Flyway rebuilds from migrations to generate scripts)
#   FLYWAY_EMAIL             = your@email.com
#   FLYWAY_TOKEN             = *** (Protected + Masked)
#
# Optional CI/CD Variables:
#   SHADOW_DATABASE_USER     = Shadow DB user (defaults to TARGET_DATABASE_USER)
#   SHADOW_DATABASE_PASSWORD = Shadow DB password (defaults to TARGET_DATABASE_PASSWORD)
#   GENERATE_DESCRIPTION     = Description for generated migration (default: AutoGenerated)
#   GENERATE_TYPES           = versioned,undo (default)
#   GIT_PUSH_TOKEN           = Token with write_repository scope, if CI_JOB_TOKEN
#                               cannot push (GitLab < 15.9 or restricted scope).
#
# Consumer repo structure:
#   my-flyway-project/
#   ├── flyway.toml
#   ├── schema-model/           ← devs edit these
#   │   ├── tables/
#   │   └── ...
#   ├── migrations/             ← generated + committed by CI
#   │   ├── V1__create_schema.sql
#   │   └── ...
#   └── .gitlab-ci.yml          ← this file
# =============================================================================

include:
  - project: 'root/templatized-with-parser'       # ← path to the templates repo
    ref: 'main'                                    # ← pin to a tag or branch
    file:
      - '/.gitlab/ci/flyway.yml'
      - '/.gitlab/ci/generate-deployment-scripts.yml'

stages:
  - generate
  - review
  - deploy

# ---------------------------------------------------------------------------
# 1. Auto-generate migration scripts from schema-model changes
#    Runs automatically on every push to dev.  Generated SQL files are saved
#    as job artifacts so reviewers can download and inspect them.
# ---------------------------------------------------------------------------
generate:dev:
  extends: .flyway_generate_migrations
  stage: generate
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

# ---------------------------------------------------------------------------
# 2. Create merge request with generated scripts (manual)
#    Reviewer clicks ▶ Play to push scripts to a new branch and open a
#    merge request.  Review the SQL diff in the MR, then merge to proceed.
# ---------------------------------------------------------------------------
commit:dev:
  extends: .flyway_commit_migrations
  stage: review
  variables:
    MR_TARGET_BRANCH: "main"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual

# ---------------------------------------------------------------------------
# 3. Deploy — apply migrations to the dev database
#    After the reviewer has committed the scripts, click ▶ Play to deploy.
# ---------------------------------------------------------------------------
migrate:dev:
  extends: .flyway_migrate
  stage: deploy
  environment:
    name: development
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual

# ---------------------------------------------------------------------------
# Optional: manual repair if migration history gets out of sync
# ---------------------------------------------------------------------------
repair:dev:
  extends: .flyway_repair
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual
