# =============================================================================
# Staging → Production with Manual Approval Gate
# =============================================================================
# Migrations auto-deploy to staging on push to main.
# Production deploys require a Git tag AND manual approval (click "Play").
#
# CI/CD Variables required (Settings → CI/CD → Variables):
#
#   Environment scope: staging
#     TARGET_DATABASE_JDBC     = jdbc:sqlserver://staging-db:1433;databaseName=myapp;encrypt=true
#     TARGET_DATABASE_USER     = flyway_user
#     TARGET_DATABASE_PASSWORD = *** (Protected + Masked)
#
#   Environment scope: production
#     TARGET_DATABASE_JDBC     = jdbc:sqlserver://prod-db:1433;databaseName=myapp;encrypt=true
#     TARGET_DATABASE_USER     = flyway_user
#     TARGET_DATABASE_PASSWORD = *** (Protected + Masked)
#
#   All environments:
#     FLYWAY_EMAIL             = your@email.com
#     FLYWAY_TOKEN             = *** (Protected + Masked)
#
# Consumer repo structure:
#   my-flyway-project/
#   ├── migrations/
#   │   ├── V1__create_schema.sql
#   │   └── V2__add_users_table.sql
#   └── .gitlab-ci.yml          ← this file
# =============================================================================

include:
  - project: 'root/templatized-with-parser'       # ← path to the templates repo
    ref: 'main'                                    # ← pin to a tag or branch
    file: '/.gitlab/ci/flyway.yml'

stages:
  - validate
  - staging
  - production

# ---------------------------------------------------------------------------
# Validate on main branch and tags
# ---------------------------------------------------------------------------
validate:
  extends: .flyway_validate
  stage: validate
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Auto-deploy to staging on push to main
# ---------------------------------------------------------------------------
migrate:staging:
  extends: .flyway_migrate
  stage: staging
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Show production status before deploying (on tags only)
# ---------------------------------------------------------------------------
info:production:
  extends: .flyway_info
  stage: production
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Deploy to production — manual approval required (on tags only)
# ---------------------------------------------------------------------------
migrate:production:
  extends: .flyway_migrate
  stage: production
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

# ---------------------------------------------------------------------------
# Manual repair for production
# ---------------------------------------------------------------------------
repair:production:
  extends: .flyway_repair
  stage: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual
