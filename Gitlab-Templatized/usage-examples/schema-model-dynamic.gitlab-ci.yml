# =============================================================================
# Schema Model + Dynamic Pipeline — Full Workflow
# =============================================================================
# Combines flyway diff script generation with registry-driven multi-database
# deployment.  Developers push to the dev branch; the pipeline generates
# migration scripts, opens a merge request to main for review, and once
# merged, deploys to all registry targets via a dynamic child pipeline.
#
# Pipeline flow:
#   dev branch:                           main branch:
#   ┌──────────┐     ┌────────────┐      ┌──────────┐     ┌──────────┐
#   │ generate │ ──▶ │ create MR  │ ──▶  │ pipeline │ ──▶ │  deploy  │
#   │  (auto)  │     │  (manual)  │      │  (auto)  │     │  (child) │
#   └──────────┘     └────────────┘      └──────────┘     └──────────┘
#                       merge MR ──▶
#
# CI/CD Variables required (Settings → CI/CD → Variables):
#   TARGET_DATABASE_JDBC       = JDBC URL of the Dev database (diff source)
#   TARGET_DATABASE_USER       = Login for Dev + target databases
#   TARGET_DATABASE_PASSWORD   = *** (Protected + Masked)
#   SHADOW_DATABASE_JDBC       = JDBC URL of a shadow/build database (empty DB
#                                 Flyway rebuilds from migrations to generate scripts)
#   REGISTRY_SERVER            = SQL Server hostname for the registry DB
#   REGISTRY_USER              = Login for the registry DB
#   REGISTRY_PASSWORD          = *** (Protected + Masked)
#   FLYWAY_EMAIL               = your@email.com
#   FLYWAY_TOKEN               = *** (Protected + Masked)
#
# Optional CI/CD Variables:
#   SHADOW_DATABASE_USER       = Shadow DB user (defaults to TARGET_DATABASE_USER)
#   SHADOW_DATABASE_PASSWORD   = Shadow DB password (defaults to TARGET_DATABASE_PASSWORD)
#   GENERATE_DESCRIPTION       = Description for generated migration (default: AutoGenerated)
#   GENERATE_TYPES             = versioned,undo (default)
#   GIT_PUSH_TOKEN             = Token with write_repository scope (if CI_JOB_TOKEN can't push)
#   GITLAB_EXTERNAL_URL        = Browser-reachable GitLab URL for MR links
#                                 (default: CI_SERVER_URL; set if behind port mapping,
#                                  e.g. http://localhost:8080)
#   REGISTRY_DATABASE          = flyway_registry  (default)
#   REGISTRY_PORT              = 1433             (default)
#   JDBC_PORT                  = 1433             (default)
#   FILTER_LOCATION            = all              (default — or e.g. "London")
#   INCLUDE_REPLICAS           = false            (default)
#   FLYWAY_LOCATIONS           = filesystem:./migrations (default)
#   RUNNER_TAG_MAP             = JSON map of location → runner tag overrides
#   TEMPLATE_PROJECT           = root/templatized-with-parser (default)
#   TEMPLATE_REF               = main                        (default)
#
# Consumer repo structure:
#   my-flyway-project/
#   ├── flyway.toml
#   ├── schema-model/           ← devs edit these
#   │   ├── tables/
#   │   └── ...
#   ├── migrations/             ← generated + committed by CI
#   │   ├── V1__create_schema.sql
#   │   └── ...
#   └── .gitlab-ci.yml          ← this file
# =============================================================================

include:
  - project: 'root/templatized-with-parser'
    ref: 'main'
    file:
      - '/.gitlab/ci/flyway.yml'
      - '/.gitlab/ci/generate-deployment-scripts.yml'
      - '/.gitlab/ci/merge-guard.yml'

workflow:
  name: '$PIPELINE_LABEL'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        PIPELINE_LABEL: "MR Guard — $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME → $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - if: $CI_COMMIT_BRANCH == "dev"
      variables:
        PIPELINE_LABEL: "DEV — Generate Migrations"
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        PIPELINE_LABEL: "MAIN — Deploy to Targets"
    - when: always

stages:
  - guard
  - generate
  - review
  - pipeline
  - deploy

variables:
  DEV_BRANCH: "dev"
  DEPLOY_BRANCH: "main"
  TEMPLATE_PROJECT: "root/templatized-with-parser"
  TEMPLATE_REF: "main"
  # Deploy region filter — "all" deploys everywhere, or set to a specific
  # region name: "London", "New York", "Tokyo"
  # Can be overridden at pipeline run time via "Run pipeline" → Variables.
  FILTER_LOCATION: "all"

# =============================================================================
# MR PIPELINE — Guard rails (run automatically on every merge request)
# =============================================================================

# Block reverse merges (e.g. main → dev).
guard:merge-direction:
  extends: .merge_direction_guard
  variables:
    PROMOTION_ORDER: "dev,main"

# Block migration file changes in MRs targeting dev.
guard:migration-files:
  extends: .migration_guard
  variables:
    MIGRATION_PROTECTED_BRANCHES: "dev"


# =============================================================================
# DEV BRANCH — Validate schema-model only (no migration scripts here)
# =============================================================================

validate:schema-model:
  extends: .flyway_validate_schema_model
  stage: generate
  rules:
    - if: $CI_COMMIT_BRANCH == $DEV_BRANCH


# =============================================================================
# MAIN BRANCH — Generate & commit migration scripts, then deploy
# =============================================================================

# Auto-generate migration SQL from schema-model changes.
generate:scripts:
  extends: .flyway_generate_migrations
  stage: generate
  rules:
    - if: $CI_COMMIT_BRANCH == $DEPLOY_BRANCH && $CI_COMMIT_MESSAGE !~ /auto-generated migration/

# Commit generated migration scripts to main.
commit:scripts:
  extends: .flyway_commit_migrations
  stage: review
  variables:
    MR_TARGET_BRANCH: "$DEPLOY_BRANCH"
  rules:
    - if: $CI_COMMIT_BRANCH == $DEPLOY_BRANCH && $CI_COMMIT_MESSAGE !~ /auto-generated migration/
      when: manual

# ---------------------------------------------------------------------------
# Generate dynamic child pipelines from the registry (auto)
#    Runs on main (after the MR is merged).  One generate job per region
#    plus one for all.  Each queries the registry with a different
#    FILTER_LOCATION and produces its own artifact.
# ---------------------------------------------------------------------------
.generate_base:
  stage: pipeline
  image: python:3.12-slim
  script:
    - apt-get update -qq && apt-get install -y -qq git > /dev/null
    - git clone --depth 1 --branch "$TEMPLATE_REF"
        "http://gitlab-ci-token:${CI_JOB_TOKEN}@172.30.0.2/${TEMPLATE_PROJECT}.git"
        /tmp/templates
    - pip install --quiet -r /tmp/templates/scripts/requirements.txt
    - echo "Generating pipeline for ${FILTER_LOCATION} → ${OUTPUT_FILE}"
    - python /tmp/templates/scripts/generate_pipeline.py
    - cat "${OUTPUT_FILE}"
  rules:
    - if: $CI_COMMIT_BRANCH == $DEPLOY_BRANCH

generate:all:
  extends: .generate_base
  variables:
    FILTER_LOCATION: "all"
    OUTPUT_FILE: "dynamic-pipeline-all.yml"
  artifacts:
    paths: ["dynamic-pipeline-all.yml"]
    expire_in: 1 hour

generate:london:
  extends: .generate_base
  variables:
    FILTER_LOCATION: "London"
    OUTPUT_FILE: "dynamic-pipeline-london.yml"
  artifacts:
    paths: ["dynamic-pipeline-london.yml"]
    expire_in: 1 hour

generate:new-york:
  extends: .generate_base
  variables:
    FILTER_LOCATION: "New York"
    OUTPUT_FILE: "dynamic-pipeline-new-york.yml"
  artifacts:
    paths: ["dynamic-pipeline-new-york.yml"]
    expire_in: 1 hour

generate:tokyo:
  extends: .generate_base
  variables:
    FILTER_LOCATION: "Tokyo"
    OUTPUT_FILE: "dynamic-pipeline-tokyo.yml"
  artifacts:
    paths: ["dynamic-pipeline-tokyo.yml"]
    expire_in: 1 hour

# ---------------------------------------------------------------------------
# 4. Deploy — one button per region + deploy all
#    After merge to main, you'll see these buttons in the pipeline:
#      ▶ deploy:all        — deploy to every region
#      ▶ deploy:london     — deploy to London only
#      ▶ deploy:new-york   — deploy to New York only
#      ▶ deploy:tokyo      — deploy to Tokyo only
#    Click whichever you need.
# ---------------------------------------------------------------------------
deploy:all:
  stage: deploy
  trigger:
    include:
      - artifact: dynamic-pipeline-all.yml
        job: generate:all
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == $DEPLOY_BRANCH
      when: manual
      allow_failure: true

deploy:london:
  stage: deploy
  trigger:
    include:
      - artifact: dynamic-pipeline-london.yml
        job: generate:london
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == $DEPLOY_BRANCH
      when: manual
      allow_failure: true

deploy:new-york:
  stage: deploy
  trigger:
    include:
      - artifact: dynamic-pipeline-new-york.yml
        job: generate:new-york
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == $DEPLOY_BRANCH
      when: manual
      allow_failure: true

deploy:tokyo:
  stage: deploy
  trigger:
    include:
      - artifact: dynamic-pipeline-tokyo.yml
        job: generate:tokyo
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == $DEPLOY_BRANCH
      when: manual
      allow_failure: true
