# =============================================================================
# Single Database — Development Workflow
# =============================================================================
# Use this when you have ONE database and deploy from a "dev" branch.
#
# CI/CD Variables required (Settings → CI/CD → Variables):
#   TARGET_DATABASE_JDBC     = jdbc:sqlserver://dev-db:1433;databaseName=myapp_dev;encrypt=true
#   TARGET_DATABASE_USER     = flyway_user
#   TARGET_DATABASE_PASSWORD = *** (Protected + Masked)
#   FLYWAY_EMAIL             = your@email.com
#   FLYWAY_TOKEN             = *** (Protected + Masked)
#
# Consumer repo structure:
#   my-flyway-project/
#   ├── migrations/
#   │   ├── V1__create_schema.sql
#   │   └── V2__add_users_table.sql
#   └── .gitlab-ci.yml          ← this file
# =============================================================================

include:
  - project: 'root/templatized-with-parser'       # ← path to the templates repo
    ref: 'main'                                    # ← pin to a tag or branch
    file: '/.gitlab/ci/flyway.yml'

stages:
  - validate
  - deploy

# ---------------------------------------------------------------------------
# Validate migrations on merge requests and dev branch pushes
# ---------------------------------------------------------------------------
validate:dev:
  extends: .flyway_validate
  stage: validate
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "dev"

# Show current migration status
info:dev:
  extends: .flyway_info
  stage: validate
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "dev"

# ---------------------------------------------------------------------------
# Deploy migrations to dev database on push to dev branch
# ---------------------------------------------------------------------------
migrate:dev:
  extends: .flyway_migrate
  stage: deploy
  environment:
    name: development
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

# ---------------------------------------------------------------------------
# Manual repair — use if migration history gets out of sync
# ---------------------------------------------------------------------------
repair:dev:
  extends: .flyway_repair
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual
