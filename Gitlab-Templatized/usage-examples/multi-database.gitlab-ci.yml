# =============================================================================
# Multiple Databases — Explicit Jobs (2–10 databases)
# =============================================================================
# Use this when you deploy the same migrations to several named databases.
# Each database gets its own validate + migrate job with clear naming.
#
# CI/CD Variables required (Settings → CI/CD → Variables):
#
#   Database 1 (e.g. Users DB):
#     TARGET_DATABASE_JDBC_1     = jdbc:sqlserver://db-host:1433;databaseName=users_db;encrypt=true
#     TARGET_DATABASE_USER_1     = flyway_user
#     TARGET_DATABASE_PASSWORD_1 = *** (Protected + Masked)
#
#   Database 2 (e.g. Orders DB):
#     TARGET_DATABASE_JDBC_2     = jdbc:sqlserver://db-host:1433;databaseName=orders_db;encrypt=true
#     TARGET_DATABASE_USER_2     = flyway_user
#     TARGET_DATABASE_PASSWORD_2 = *** (Protected + Masked)
#
#   Database 3 (e.g. Analytics DB):
#     TARGET_DATABASE_JDBC_3     = jdbc:sqlserver://db-host:1433;databaseName=analytics_db;encrypt=true
#     TARGET_DATABASE_USER_3     = flyway_user
#     TARGET_DATABASE_PASSWORD_3 = *** (Protected + Masked)
#
#   All databases:
#     FLYWAY_EMAIL               = your@email.com
#     FLYWAY_TOKEN               = *** (Protected + Masked)
#
# To add more databases: duplicate a job block and change the suffix number.
#
# Consumer repo structure:
#   my-flyway-project/
#   ├── migrations/
#   │   ├── V1__create_schema.sql
#   │   └── V2__add_users_table.sql
#   └── .gitlab-ci.yml          ← this file
# =============================================================================

include:
  - project: 'your-group/flyway-ci-templates'    # ← change to your templates repo path
    ref: 'v1.0.0'                                 # ← pin to a release tag
    file: '/.gitlab/ci/flyway.yml'

stages:
  - validate
  - deploy

# ---------------------------------------------------------------------------
# Validate against database 1 (catches SQL errors early)
# ---------------------------------------------------------------------------
validate:
  extends: .flyway_validate
  stage: validate
  variables:
    FLYWAY_URL:      "${TARGET_DATABASE_JDBC_1}"
    FLYWAY_USER:     "${TARGET_DATABASE_USER_1}"
    FLYWAY_PASSWORD: "${TARGET_DATABASE_PASSWORD_1}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_IID

# ---------------------------------------------------------------------------
# Deploy to each database
# ---------------------------------------------------------------------------
migrate:users-db:
  extends: .flyway_migrate
  stage: deploy
  variables:
    FLYWAY_URL:      "${TARGET_DATABASE_JDBC_1}"
    FLYWAY_USER:     "${TARGET_DATABASE_USER_1}"
    FLYWAY_PASSWORD: "${TARGET_DATABASE_PASSWORD_1}"
  environment:
    name: users-db
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

migrate:orders-db:
  extends: .flyway_migrate
  stage: deploy
  variables:
    FLYWAY_URL:      "${TARGET_DATABASE_JDBC_2}"
    FLYWAY_USER:     "${TARGET_DATABASE_USER_2}"
    FLYWAY_PASSWORD: "${TARGET_DATABASE_PASSWORD_2}"
  environment:
    name: orders-db
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

migrate:analytics-db:
  extends: .flyway_migrate
  stage: deploy
  variables:
    FLYWAY_URL:      "${TARGET_DATABASE_JDBC_3}"
    FLYWAY_USER:     "${TARGET_DATABASE_USER_3}"
    FLYWAY_PASSWORD: "${TARGET_DATABASE_PASSWORD_3}"
  environment:
    name: analytics-db
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual   # optional: require manual trigger for analytics

# ---------------------------------------------------------------------------
# Manual repair — one per database
# ---------------------------------------------------------------------------
repair:users-db:
  extends: .flyway_repair
  stage: deploy
  variables:
    FLYWAY_URL:      "${TARGET_DATABASE_JDBC_1}"
    FLYWAY_USER:     "${TARGET_DATABASE_USER_1}"
    FLYWAY_PASSWORD: "${TARGET_DATABASE_PASSWORD_1}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

repair:orders-db:
  extends: .flyway_repair
  stage: deploy
  variables:
    FLYWAY_URL:      "${TARGET_DATABASE_JDBC_2}"
    FLYWAY_USER:     "${TARGET_DATABASE_USER_2}"
    FLYWAY_PASSWORD: "${TARGET_DATABASE_PASSWORD_2}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
